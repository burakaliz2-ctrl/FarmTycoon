<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çiftlik İmparatorluğu Tycoon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-primary: #12181f; --bg-secondary: #1a232d; --bg-tertiary: #24303f; --text-main: #e2e8f0; --gold: #f59e0b; --gem: #06b6d4; --border-color: #2e3d52; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: var(--bg-primary); color: var(--text-main); height: 100vh; overflow: hidden; }
        
        /* MOBİL DÜZENLEMELER */
        @media (max-width: 768px) {
            #app { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex !important; flex-direction: column !important; height: 90px !important; }
            .nav-row { display: flex; width: 100%; height: 50%; }
            .mobile-nav-btn { flex: 1; font-size: 0.55rem !important; }
            .main-content { height: calc(100vh - 150px) !important; padding: 10px; }
            .farm-card { min-height: 120px !important; }
        }

        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100vw; background: var(--bg-secondary); border-top: 1px solid var(--border-color); z-index: 9999; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .farm-grid, .quest-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .farm-card { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; background: var(--gold); }
    </style>
</head>
<body>

    <div id="app">
        <main class="main-content">
            <section id="tab-farm" class="tab-content active">
                <h2>🌾 Çiftlik</h2>
                <div class="farm-grid" id="farm-fields-container"></div>
            </section>
            <section id="tab-quests" class="tab-content">
                <h2>📜 Kontratlar</h2>
                <div class="quest-list" id="quests-container"></div>
            </section>
            <section id="tab-settings" class="tab-content">
                <button id="btn-trigger-prestige" class="btn" style="background:var(--danger)">PRESTİJ YAP</button>
            </section>
        </main>
    </div>

    <nav class="mobile-nav" id="mobile-nav-bar">
        <div class="nav-row">
            <button class="mobile-nav-btn" data-tab="farm">🌾Tarla</button>
            <button class="mobile-nav-btn" data-tab="ranking">📊Skor</button>
            <button class="mobile-nav-btn" data-tab="quests">📜Görev</button>
            <button class="mobile-nav-btn" data-tab="market">⚖️Borsa</button>
        </div>
        <div class="nav-row">
            <button class="mobile-nav-btn" data-tab="factory">🏭Sanayi</button>
            <button class="mobile-nav-btn" data-tab="research">🔬Ar-Ge</button>
            <button class="mobile-nav-btn" data-tab="prestige">👑Prestij</button>
            <button class="mobile-nav-btn" data-tab="settings">⚙️Ayarlar</button>
        </div>
    </nav>

    <script>
        const Game = {
            state: { gold: 150, totals: { goldEarned: 0 }, activeQuests: [], unlockedFields: [1], fields: { 1: { cropId: "wheat", progress: 0 } } },

            init() {
                const saved = localStorage.getItem("CiftlikTycoon_Save");
                if (saved) this.state = JSON.parse(saved);
                
                // Görev güvenliği
                if (!this.state.activeQuests || this.state.activeQuests.length === 0) {
                    this.state.activeQuests = [];
                    for(let i=0; i<3; i++) this.state.activeQuests.push(this.generateRandomQuest());
                }
                
                this.renderQuests();
                document.querySelectorAll(".mobile-nav-btn").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
                        document.getElementById("tab-" + e.target.dataset.tab).classList.add("active");
                    });
                });
                document.getElementById("btn-trigger-prestige").onclick = () => this.triggerPrestige();
            },

            generateRandomQuest() {
                return { id: Math.random(), text: "20 Buğday hasat et", target: 20, current: 0, rewardGold: 400, rewardGem: 2 };
            },

            renderQuests() {
                const qContainer = document.getElementById("quests-container");
                if(!qContainer) return;
                qContainer.innerHTML = "";
                this.state.activeQuests.forEach((q, index) => {
                    qContainer.innerHTML += `<div class="farm-card"><h3>${q.text}</h3><button onclick="Game.claimQuest(${index})">Ödülü Al</button></div>`;
                });
            },

            claimQuest(index) {
                const q = this.state.activeQuests[index];
                this.state.gold += q.rewardGold;
                this.state.activeQuests.splice(index, 1);
                this.state.activeQuests.push(this.generateRandomQuest());
                localStorage.setItem("CiftlikTycoon_Save", JSON.stringify(this.state));
                this.renderQuests();
            },

            triggerPrestige() {
                this.state.gold = 150;
                this.state.activeQuests = [];
                for(let i=0; i<3; i++) this.state.activeQuests.push(this.generateRandomQuest());
                localStorage.setItem("CiftlikTycoon_Save", JSON.stringify(this.state));
                setTimeout(() => window.location.reload(), 100);
            }
        };
        window.onload = () => Game.init();
    </script>
</body>
</html>
